<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; font-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; worker-src 'self' blob:;">
  <title>TOKI Popout</title>
  <link rel="stylesheet" href="style.css">
  <style>
    html, body { width: 100%; height: 100%; overflow: hidden; margin: 0; background: var(--bg-primary); }

    /* ===== Popout root ===== */
    #popout-root { display: flex; flex-direction: column; height: 100%; border-radius: 0; }

    /* ===== Popout terminal body (avatar + terminal side by side) ===== */
    #popout-body { display: flex; flex: 1; min-height: 0; gap: 4px; padding: 4px; overflow: hidden; }

    /* ===== Popout avatar (reuse main styles but adjust) ===== */
    #popout-avatar {
      width: 150px; flex-shrink: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      background: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: var(--radius); overflow: hidden; position: relative;
    }
    #popout-avatar-display {
      flex: 1; display: flex; align-items: center; justify-content: center;
      min-height: 0; overflow: hidden; width: 100%;
    }
    #popout-avatar-img {
      max-width: 100%; max-height: 100%; object-fit: contain;
    }
    #popout-avatar .popout-status {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 6px; background: linear-gradient(135deg, #fc96ab 0%, #f8b4c8 100%);
      color: #fff; font-size: 11px; font-weight: 600; width: 100%; flex-shrink: 0;
    }
    #popout-avatar .popout-status.working {
      background: linear-gradient(135deg, #4a90d9 0%, #6fb3f2 100%);
    }

    /* ===== Terminal wrap ===== */
    #popout-terminal-wrap {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      background: #fff; border: 1px solid var(--border-color);
      border-radius: var(--radius); position: relative;
    }
    #popout-terminal-wrap #terminal-container {
      flex: 1; overflow: hidden; padding: 6px; background: #fff; position: relative; z-index: 1;
    }

    /* ===== MomoTalk header in popout (make draggable) ===== */
    .popout-momo-header {
      -webkit-app-region: drag;
    }
    .popout-momo-header .momo-header-right { -webkit-app-region: no-drag; }
    .popout-momo-header button { -webkit-app-region: no-drag; }

    /* Close button red hover */
    .popout-momo-header .btn-close-popout:hover {
      background: #e53935 !important;
    }

    /* ===== Sidebar popout header ===== */
    #popout-sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
      height: 38px; padding: 0 14px;
      background: linear-gradient(135deg, #4a90d9 0%, #6fb3f2 100%);
      color: #fff; font-size: 13px; font-weight: 600;
      -webkit-app-region: drag; flex-shrink: 0;
    }
    #popout-sidebar-header .sidebar-header-btns {
      display: flex; gap: 6px; -webkit-app-region: no-drag;
    }
    #popout-sidebar-header button {
      -webkit-app-region: no-drag;
      background: rgba(255,255,255,0.2); border: none; color: #fff;
      cursor: pointer; font-size: 12px; width: 26px; height: 26px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    #popout-sidebar-header button:hover { background: rgba(255,255,255,0.4); }
    #popout-sidebar-header .btn-close-popout:hover { background: #e53935; }

    /* Sidebar content */
    #popout-sidebar-content {
      flex: 1; overflow-y: auto; background: var(--bg-secondary); padding: 4px;
    }
  </style>
</head>
<body>
  <div id="popout-root"></div>
  <script src="popout.js"></script>
</body>
</html>
